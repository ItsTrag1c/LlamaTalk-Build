<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 20 320 430" width="320" height="430">
  <defs>
    <linearGradient id="shieldGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12121d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3e3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a38;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a3a4c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M260,30 L395,80 L395,270 Q395,390 260,430 Q125,390 125,270 L125,80 Z"
        fill="url(#shieldGrad5)" stroke="#ff9f43" stroke-width="2.5"/>

  <!-- Inner shield border -->
  <path d="M260,48 L383,92 L383,266 Q383,378 260,418 Q137,378 137,266 L137,92 Z"
        fill="none" stroke="#ff9f43" stroke-width="0.6" opacity="0.3"/>

  <!-- Circuit traces -->
  <path d="M137,150 L168,150 L168,122" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <path d="M383,150 L352,150 L352,122" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <path d="M137,330 L162,330 L162,360" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <path d="M383,330 L358,330 L358,360" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <circle cx="168" cy="122" r="2.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="352" cy="122" r="2.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="162" cy="360" r="2.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="358" cy="360" r="2.5" fill="#00d4ff" opacity="0.4"/>
  <path d="M168,122 L168,108 L190,108" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <path d="M352,122 L352,108 L330,108" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <circle cx="190" cy="108" r="1.5" fill="#00d4ff" opacity="0.3"/>
  <circle cx="330" cy="108" r="1.5" fill="#00d4ff" opacity="0.3"/>

  <!-- Antenna -->
  <line x1="260" y1="55" x2="260" y2="72" stroke="#555" stroke-width="3"/>
  <ellipse cx="260" cy="50" rx="14" ry="6" fill="none" stroke="#666" stroke-width="2.5"/>
  <ellipse cx="260" cy="47" rx="8" ry="4" fill="none" stroke="#666" stroke-width="1.5"/>
  <circle cx="260" cy="44" r="3" fill="#00d4ff" filter="url(#glow)"/>

  <!-- Head -->
  <rect x="200" y="72" width="120" height="115" rx="14" fill="url(#bodyGrad5)" stroke="#555" stroke-width="2"/>
  <rect x="200" y="72" width="120" height="24" rx="14" fill="url(#titleBarGrad)"/>
  <rect x="200" y="86" width="120" height="10" fill="url(#titleBarGrad)"/>
  <circle cx="217" cy="84" r="4.5" fill="#ff5f57"/>
  <circle cx="232" cy="84" r="4.5" fill="#ffbd2e"/>
  <circle cx="247" cy="84" r="4.5" fill="#28c840"/>

  <!-- Screen face -->
  <rect x="210" y="102" width="100" height="75" rx="5" fill="url(#screenGrad5)"/>

  <!-- Eyes -->
  <rect x="228" y="116" width="14" height="22" rx="2" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <rect x="278" y="116" width="14" height="22" rx="2" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>

  <!-- Mouth -->
  <text x="242" y="162" fill="#28c840" font-family="Consolas, monospace" font-size="15" font-weight="bold">$ _</text>

  <!-- Bolt -->
  <polygon points="260,95 265,104 259,104 264,113 257,106 262,106" fill="#ffbd2e"/>

  <!-- Neck -->
  <rect x="250" y="187" width="20" height="16" rx="5" fill="#3a3a4a"/>
  <circle cx="248" cy="195" r="2.5" fill="#555"/>
  <circle cx="272" cy="195" r="2.5" fill="#555"/>

  <!-- Body -->
  <rect x="205" y="203" width="110" height="110" rx="14" fill="url(#bodyGrad5)" stroke="#555" stroke-width="2"/>

  <!-- Chest terminal -->
  <rect x="217" y="213" width="86" height="88" rx="6" fill="url(#screenGrad5)" stroke="#333" stroke-width="1"/>
  <rect x="217" y="213" width="86" height="16" rx="6" fill="url(#titleBarGrad)"/>
  <rect x="217" y="223" width="86" height="6" fill="url(#titleBarGrad)"/>
  <circle cx="227" cy="221" r="2.5" fill="#ff5f57"/>
  <circle cx="236" cy="221" r="2.5" fill="#ffbd2e"/>
  <circle cx="245" cy="221" r="2.5" fill="#28c840"/>

  <text x="223" y="240" fill="#555" font-family="Consolas, monospace" font-size="7">┌──── </text>
  <text x="244" y="240" fill="#888" font-family="Consolas, monospace" font-size="7">Cd:/</text>
  <text x="260" y="240" fill="#ff9f43" font-family="Consolas, monospace" font-size="7" font-weight="bold">Clank</text>
  <text x="275" y="240" fill="#555" font-family="Consolas, monospace" font-size="7"> ────┐</text>
  <text x="223" y="251" fill="#ccc" font-family="Consolas, monospace" font-size="6.5">│ Welcome back!   │</text>
  <text x="223" y="260" fill="#555" font-family="Consolas, monospace" font-size="6">│ </text>
  <text x="232" y="260" fill="#00d4ff" font-family="Consolas, monospace" font-size="6">sonnet-4</text>
  <text x="271" y="260" fill="#666" font-family="Consolas, monospace" font-size="6"> · Build</text>
  <text x="223" y="270" fill="#ff9f43" font-family="Consolas, monospace" font-size="6">│  ⢀⣀⣤⣄         │</text>
  <text x="223" y="278" fill="#ff9f43" font-family="Consolas, monospace" font-size="6">│ ⢀⡴⡃⢔⣮⠯⡄      │</text>
  <text x="223" y="288" fill="#555" font-family="Consolas, monospace" font-size="6">│ </text>
  <text x="232" y="288" fill="#00d4ff" font-family="Consolas, monospace" font-size="6">/help</text>
  <text x="257" y="288" fill="#666" font-family="Consolas, monospace" font-size="6"> /mode</text>
  <text x="223" y="297" fill="#555" font-family="Consolas, monospace" font-size="7">└──────────────┘</text>

  <!-- Arms -->
  <path d="M205,220 Q172,225 165,258 Q158,290 175,305" fill="none" stroke="#555" stroke-width="9" stroke-linecap="round"/>
  <path d="M315,220 Q348,225 355,258 Q362,290 345,305" fill="none" stroke="#555" stroke-width="9" stroke-linecap="round"/>
  <path d="M205,220 Q172,225 165,258 Q158,290 175,305" fill="none" stroke="#00d4ff" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <path d="M315,220 Q348,225 355,258 Q362,290 345,305" fill="none" stroke="#00d4ff" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- Hands -->
  <circle cx="177" cy="309" r="10" fill="#3a3a4a" stroke="#555" stroke-width="2"/>
  <circle cx="343" cy="309" r="10" fill="#3a3a4a" stroke="#555" stroke-width="2"/>
  <circle cx="177" cy="309" r="4" fill="#555"/>
  <circle cx="343" cy="309" r="4" fill="#555"/>

  <!-- Legs -->
  <rect x="228" y="313" width="20" height="50" rx="7" fill="url(#bodyGrad5)" stroke="#555" stroke-width="2"/>
  <rect x="272" y="313" width="20" height="50" rx="7" fill="url(#bodyGrad5)" stroke="#555" stroke-width="2"/>
  <line x1="238" y1="323" x2="238" y2="353" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="282" y1="323" x2="282" y2="353" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>

  <!-- Feet -->
  <rect x="220" y="358" width="36" height="14" rx="6" fill="#3a3a4a" stroke="#555" stroke-width="1.5"/>
  <rect x="264" y="358" width="36" height="14" rx="6" fill="#3a3a4a" stroke="#555" stroke-width="1.5"/>
</svg>